<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>副本校园 - 游戏化运动激励工具</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2392bd83'/%3E%3Cpath d='M10 34c0-13 9-22 22-22s22 9 22 22v5c0 8-6 13-14 13H24c-8 0-14-5-14-13v-5Z' fill='%237b56f4'/%3E%3Cpath d='M10 38h44v2c0 8-6 12-14 12H24c-8 0-14-4-14-12v-2Z' fill='%236947dd'/%3E%3Ccircle cx='24' cy='30' r='4' fill='white'/%3E%3Ccircle cx='40' cy='30' r='4' fill='white'/%3E%3C/svg%3E" />
    <style>
      :root {
        --ink: #20232a;
        --muted: #6c737f;
        --line: #dce2ea;
        --paper: #f6f2ea;
        --surface: #fffdf8;
        --surface-2: #eef7f1;
        --green: #147a64;
        --green-2: #1f9d78;
        --coral: #e75f48;
        --amber: #f2b84b;
        --teal: #2a8ca0;
        --shadow: 0 18px 42px rgba(31, 42, 55, 0.12);
        --radius: 18px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.85), rgba(246, 242, 234, 0.96)),
          url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d7cdbb' stroke-width='1' stroke-opacity='0.36'%3E%3Cpath d='M0 20h120M0 60h120M0 100h120M20 0v120M60 0v120M100 0v120'/%3E%3C/g%3E%3C/svg%3E");
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
        color: inherit;
      }

      .app {
        width: min(100%, 460px);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--paper);
        box-shadow: 0 0 0 1px rgba(32, 35, 42, 0.06);
        position: relative;
        overflow: hidden;
      }

      .screen {
        min-height: 100vh;
        padding: 18px 18px 94px;
      }

      .screen.without-nav {
        padding-bottom: 24px;
      }

      .statusbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 2px 2px 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .mark {
        width: 34px;
        height: 34px;
        border-radius: 11px;
        display: grid;
        place-items: center;
        background: var(--ink);
        color: #fff;
        box-shadow: 0 10px 24px rgba(32, 35, 42, 0.18);
      }

      .mark.app-mark {
        overflow: hidden;
        background: linear-gradient(135deg, #93bd84, #74a874);
        box-shadow: 0 10px 24px rgba(115, 80, 214, 0.22);
      }

      .app-monster {
        width: 27px;
        height: 23px;
        border-radius: 13px 13px 9px 9px;
        position: relative;
        background: linear-gradient(180deg, #865df7, #6f4fe4);
        box-shadow: inset 0 -6px 0 rgba(32, 35, 42, 0.12);
      }

      .app-monster::before,
      .app-monster::after {
        content: "";
        position: absolute;
        top: 8px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #fff;
      }

      .app-monster::before {
        left: 8px;
      }

      .app-monster::after {
        right: 8px;
      }

      .mark svg,
      .icon svg,
      .btn svg,
      .badge-icon svg,
      .nav-btn svg,
      .medal svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        flex: 0 0 auto;
        display: block;
      }

      .hero {
        min-height: calc(100vh - 42px);
        display: flex;
        flex-direction: column;
      }

      .hero-main {
        flex: 1;
        display: grid;
        align-content: start;
        gap: 18px;
      }

      .hero-art {
        height: clamp(226px, 42vh, 330px);
        border-radius: 28px;
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at 72% 24%, rgba(191, 90, 242, 0.32), transparent 34%),
          radial-gradient(circle at 18% 20%, rgba(0, 245, 255, 0.18), transparent 34%),
          linear-gradient(145deg, rgba(20, 22, 44, 0.96), rgba(42, 20, 72, 0.92) 54%, rgba(9, 37, 51, 0.94));
        border: 1px solid rgba(32, 35, 42, 0.1);
        box-shadow: var(--shadow);
      }

      .hero-art::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(12, 20, 34, 0.1), rgba(12, 20, 34, 0.42)),
          url("./用户附件2.png") center / cover no-repeat;
        opacity: 0.3;
      }

      .hero-boss-stage {
        position: absolute;
        left: 22px;
        right: 22px;
        top: 24px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        z-index: 1;
      }

      .hero-boss {
        display: grid;
        gap: 9px;
        justify-items: center;
        align-items: center;
        padding: 12px 9px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px);
      }

      .hero-boss-avatar {
        width: 66px;
        height: 58px;
        border-radius: var(--shape, 22px 22px 17px 17px);
        position: relative;
        background: linear-gradient(135deg, var(--boss-a), var(--boss-b));
        box-shadow: inset 0 -12px 0 rgba(0, 0, 0, 0.16), 0 12px 28px rgba(0, 0, 0, 0.22);
      }

      .hero-boss-avatar::before,
      .hero-boss-avatar::after {
        content: "";
        position: absolute;
        top: 18px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.94);
      }

      .hero-boss-avatar::before {
        left: 18px;
      }

      .hero-boss-avatar::after {
        right: 18px;
      }

      .hero-boss-avatar i {
        position: absolute;
        left: 50%;
        top: -13px;
        width: 34px;
        height: 18px;
        transform: translateX(-50%);
      }

      .hero-boss-avatar i.crown {
        background: #ffd60a;
        clip-path: polygon(0 100%, 16% 35%, 34% 100%, 50% 18%, 66% 100%, 84% 35%, 100% 100%);
      }

      .hero-boss-avatar i.cap {
        top: -10px;
        border-radius: 14px 14px 6px 6px;
        background: #c7d2fe;
        transform: translateX(-50%) rotate(-12deg);
      }

      .hero-boss-avatar i.dorm {
        top: -8px;
        width: 28px;
        height: 16px;
        border-radius: 7px 7px 3px 3px;
        background: #25314a;
      }

      .hero-boss-bar {
        width: 100%;
        height: 7px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.16);
      }

      .hero-boss-bar span {
        display: block;
        width: var(--value);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff375f, #ff9f0a);
      }

      .hero-boss b {
        color: #fff;
        font-size: 13px;
        line-height: 1.1;
      }

      .hero-boss-copy {
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: 20px;
        z-index: 1;
        display: grid;
        gap: 6px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.9);
        backdrop-filter: blur(12px);
      }

      .hero-boss-copy b {
        font-size: 17px;
      }

      .hero-boss-copy .sub {
        line-height: 1.45;
      }

      .hero h1,
      .page-title h1 {
        margin: 0;
        color: var(--ink);
        line-height: 1.06;
        letter-spacing: 0;
      }

      .hero h1 {
        font-size: clamp(34px, 9vw, 43px);
        max-width: 8em;
        line-height: 1.12;
      }

      .page-title h1 {
        font-size: 28px;
      }

      .hero p,
      .sub {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 15px;
      }

      .hero-actions {
        display: grid;
        gap: 10px;
      }

      .btn {
        min-height: 48px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
      }

      .btn.primary {
        background: var(--green);
        color: #fff;
        box-shadow: 0 12px 26px rgba(20, 122, 100, 0.24);
      }

      .btn.dark {
        background: var(--ink);
        color: #fff;
      }

      .btn.ghost {
        background: rgba(255, 253, 248, 0.76);
        color: var(--ink);
        border: 1px solid rgba(32, 35, 42, 0.1);
      }

      .btn.small {
        min-height: 36px;
        border-radius: 11px;
        padding: 0 12px;
        font-size: 13px;
      }

      .btn:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .page-title {
        display: grid;
        gap: 7px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 38px;
        border-radius: 999px;
        padding: 0 14px;
        background: rgba(255, 253, 248, 0.9);
        color: var(--muted);
        border: 1px solid rgba(32, 35, 42, 0.1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
      }

      .chip.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .panel {
        background: var(--surface);
        border: 1px solid rgba(32, 35, 42, 0.09);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: 0 10px 26px rgba(31, 42, 55, 0.08);
      }

      .panel.flat {
        box-shadow: none;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .question {
        display: grid;
        gap: 10px;
      }

      .question h2,
      .card-title,
      .section-title {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .progress-line {
        height: 8px;
        border-radius: 99px;
        background: rgba(32, 35, 42, 0.1);
        overflow: hidden;
      }

      .progress-line span {
        display: block;
        height: 100%;
        width: var(--value);
        background: var(--green);
        border-radius: inherit;
      }

      .home-hero {
        background:
          linear-gradient(135deg, rgba(244, 96, 54, 0.96), rgba(245, 175, 64, 0.94) 54%, rgba(25, 130, 116, 0.94)),
          var(--coral);
        color: #fff;
        border-radius: 24px;
        padding: 18px;
        position: relative;
        overflow: hidden;
      }

      .home-hero::after,
      .home-hero::before {
        display: none;
      }

      .home-hero > * {
        position: relative;
        z-index: 1;
      }

      .home-hero h2 {
        margin: 8px 0;
        font-size: 25px;
        line-height: 1.18;
      }

      .home-hero p {
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
        line-height: 1.55;
      }

      .task-plan {
        display: grid;
        gap: 5px;
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.45;
        font-size: 15px;
      }

      .task-plan b {
        color: #fff;
        display: block;
      }

      .streak-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .streak-pill {
        min-height: 30px;
        padding: 0 11px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        font-size: 12px;
        font-weight: 900;
      }

      .streak-pill svg {
        width: 14px;
        height: 14px;
      }

      .streak-pill strong {
        font-size: 13px;
      }

      .phase-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        width: 100%;
        justify-self: stretch;
      }

      .phase-chip {
        min-height: 44px;
        border-radius: 14px;
        padding: 8px 6px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.92);
        display: grid;
        place-items: center;
        gap: 2px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
      }

      .phase-chip b {
        font-size: 13px;
        line-height: 1.1;
        color: #fff;
      }

      .phase-chip span {
        font-size: 11px;
        line-height: 1.1;
        color: rgba(255, 255, 255, 0.74);
      }

      .timer-box .phase-chip {
        min-height: 46px;
        padding: 7px 4px;
        border-radius: 12px;
      }

      .phase-chip.done {
        background: rgba(255, 255, 255, 0.2);
      }

      .phase-chip.active {
        background: rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .phase-track {
        display: grid;
        gap: 8px;
        width: 100%;
      }

      .phase-track .phase-chip {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .phase-track .phase-chip.done {
        background: rgba(255, 255, 255, 0.11);
      }

      .phase-track .phase-chip.active {
        background: rgba(0, 245, 255, 0.18);
      }

      .phase-track .phase-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 11px;
      }

      .phase-track .phase-meta b {
        color: #fff;
      }

      .journey-banner {
        display: grid;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(32, 35, 42, 0.06);
        border: 1px solid rgba(32, 35, 42, 0.08);
      }

      .journey-banner b {
        font-size: 14px;
      }

      .journey-banner span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .quest-grid {
        display: grid;
        gap: 9px;
      }

      .quest-item {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 11px;
        border-radius: 16px;
        background: rgba(255, 253, 248, 0.78);
        border: 1px solid rgba(32, 35, 42, 0.08);
      }

      .quest-item h3 {
        margin: 0;
        font-size: 14px;
      }

      .quest-item p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .quest-reward {
        min-width: 54px;
        padding: 7px 9px;
        border-radius: 999px;
        background: rgba(20, 122, 100, 0.1);
        color: var(--green);
        text-align: center;
        font-size: 12px;
        font-weight: 900;
      }

      .mission-panel {
        background:
          radial-gradient(circle at 14% 12%, rgba(255, 159, 10, 0.16), transparent 28%),
          linear-gradient(135deg, rgba(255, 253, 248, 0.98), rgba(238, 247, 241, 0.95));
      }

      .mission-route {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .mission-step {
        min-width: 0;
        min-height: 86px;
        border-radius: 16px;
        padding: 10px 6px;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 5px;
        text-align: center;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(32, 35, 42, 0.08);
      }

      .mission-step.done {
        background: rgba(20, 122, 100, 0.1);
        border-color: rgba(20, 122, 100, 0.18);
      }

      .mission-step.active {
        background: #171a20;
        color: #fff;
        box-shadow: 0 14px 30px rgba(32, 35, 42, 0.16);
      }

      .mission-dot {
        width: 26px;
        height: 26px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        background: rgba(32, 35, 42, 0.08);
        color: var(--ink);
        font-size: 12px;
        font-weight: 1000;
      }

      .mission-step.active .mission-dot {
        background: var(--teal);
        color: #fff;
      }

      .mission-step b {
        max-width: 100%;
        font-size: 12px;
        line-height: 1.1;
      }

      .mission-step small {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.1;
      }

      .mission-step.active small {
        color: rgba(255, 255, 255, 0.66);
      }

      .mission-reward-row {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 10px;
        align-items: center;
        padding: 11px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(32, 35, 42, 0.08);
      }

      .mission-reward-row b {
        display: block;
        font-size: 14px;
        line-height: 1.25;
      }

      .mission-reward-row span:last-child {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .mission-reward-row b {
        color: var(--ink);
      }

      .raid-card {
        position: relative;
        overflow: hidden;
        display: grid;
        gap: 16px;
        text-align: left;
        color: #fff;
        background:
          radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.24), transparent 22%),
          linear-gradient(135deg, #195a76, #1f9d78 58%, #f2b84b);
        box-shadow: var(--shadow);
      }

      .raid-card[role="button"],
      .mini-map,
      .boss-preview.codex-link {
        cursor: pointer;
      }

      .raid-card.featured {
        min-height: 248px;
        border-radius: 28px;
        padding: 18px;
      }

      .raid-card .tiny,
      .battle-stage .tiny {
        color: rgba(255, 255, 255, 0.68);
      }

      .raid-card::after {
        content: "";
        position: absolute;
        inset: auto -18px -38px auto;
        width: 160px;
        height: 160px;
        border-radius: 42px;
        background: rgba(255, 255, 255, 0.08);
        transform: rotate(16deg);
      }

      .raid-card > * {
        position: relative;
        z-index: 1;
      }

      .raid-top {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }

      .raid-card h2 {
        margin: 6px 0 4px;
        font-size: 22px;
        line-height: 1.14;
        color: #fff;
      }

      .raid-card p {
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        line-height: 1.45;
      }

      .boss-codex {
        display: grid;
        gap: 12px;
      }

      .boss-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .boss-card {
        min-height: 102px;
        border-radius: 16px;
        padding: 9px 7px;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 6px;
        background: rgba(255, 253, 248, 0.76);
        border: 1px solid rgba(32, 35, 42, 0.08);
      }

      .boss-card.active {
        border-color: rgba(20, 122, 100, 0.34);
        background: rgba(238, 247, 241, 0.9);
      }

      .boss-mini {
        width: 42px;
        height: 42px;
        border-radius: var(--shape, 16px);
        position: relative;
        background: linear-gradient(135deg, var(--boss-a), var(--boss-b));
        box-shadow: inset 0 -9px 0 rgba(32, 35, 42, 0.14);
      }

      .boss-mini i {
        position: absolute;
        left: 50%;
        top: -11px;
        width: 28px;
        height: 16px;
        transform: translateX(-50%);
      }

      .boss-mini i.crown {
        background: #ffd60a;
        clip-path: polygon(0 100%, 16% 35%, 34% 100%, 50% 18%, 66% 100%, 84% 35%, 100% 100%);
      }

      .boss-mini i.cap {
        top: -9px;
        width: 30px;
        height: 15px;
        border-radius: 14px 14px 6px 6px;
        background: #c7d2fe;
        transform: translateX(-50%) rotate(-12deg);
      }

      .boss-mini i.dorm {
        top: -8px;
        width: 24px;
        height: 14px;
        border-radius: 6px 6px 3px 3px;
        background: #25314a;
      }

      .boss-mini::before,
      .boss-mini::after {
        content: "";
        position: absolute;
        top: 15px;
        width: 6px;
        height: 6px;
        border-radius: 50%;

      let state = loadState();
      let timerId = null;

      function daysAgo(n) {
        const d = new Date();
        d.setDate(d.getDate() - n);
        return d.toISOString();
      }

      function loadState() {
        const initial = seedState();
        const saved = safeStorageGet();
        if (!saved) {
          safeStorageSet(initial);
          return initial;
        }
        try {
          const parsed = JSON.parse(saved);
          const merged = normalizeState({ ...initial, ...parsed });
          safeStorageSet(merged);
          return merged;
        } catch {
          safeStorageSet(initial);
          return initial;
        }
      }

      function mergeTaskDefaults(tasks, defaults) {
        return defaults.map((defaultTask, index) => {
          const savedTask = (tasks || []).find((task) => task.id === defaultTask.id) || (tasks || [])[index] || {};
          return { ...defaultTask, ...savedTask, phases: savedTask.phases || defaultTask.phases };
        });
      }

      function mergeRaidPointDefaults(points, defaults) {
        return defaults.map((defaultPoint, index) => {
          const savedPoint = (points || []).find((point) => point.id === defaultPoint.id) || (points || [])[index] || {};
          return {
            ...defaultPoint,
            ...savedPoint,
            position: { ...(defaultPoint.position || {}), ...(savedPoint.position || {}) }
          };
        });
      }

      function mergeInventoryDefaults(inventory, defaults) {
        return defaults.map((defaultTool, index) => {
          const savedTool = (inventory || []).find((tool) => tool.name === defaultTool.name) || (inventory || [])[index] || {};
          return { ...defaultTool, ...savedTool, effect: savedTool.effect || defaultTool.effect };
        });
      }

      function mergeBossDefaults(bosses, defaults) {
        return defaults.map((defaultBoss, index) => {
          const savedBoss = (bosses || []).find((boss) => boss.id === defaultBoss.id) || (bosses || [])[index] || {};
          return {
            ...defaultBoss,
            ...savedBoss,
            maxHp: defaultBoss.maxHp,
            hp: Number.isFinite(savedBoss.hp) ? savedBoss.hp : defaultBoss.hp
          };
        });
      }

      function normalizeState(nextState) {
        const defaults = seedState();
        const bossId = nextState.bossId || defaults.bossId;
        const boss = defaults.raid.bosses.find((item) => item.id === bossId) || defaults.raid.bosses[0];
        return {
          ...defaults,
          ...nextState,
          onboarding: { ...defaults.onboarding, ...(nextState.onboarding || {}) },
          user: { ...defaults.user, ...(nextState.user || {}) },
          team: {
            ...defaults.team,
            ...(nextState.team || {}),
            name: "上海交大 D32-602 小队",
            members: (nextState.team && nextState.team.members) || defaults.team.members
          },
          raid: {
            ...defaults.raid,
            ...(nextState.raid || {}),
            bossName: boss.name,
            weakness: boss.weakness,
            targetHp: 500,
            bosses: mergeBossDefaults(nextState.raid && nextState.raid.bosses, defaults.raid.bosses),
            inventory: mergeInventoryDefaults(nextState.raid && nextState.raid.inventory, defaults.raid.inventory),
            points: mergeRaidPointDefaults(nextState.raid && nextState.raid.points, defaults.raid.points)
          },
          bossId,
          raidPointId: nextState.raidPointId || defaults.raidPointId,
          pendingRaidPointId: nextState.pendingRaidPointId || null,
          activeRaidTraining: nextState.activeRaidTraining || null,
          raidResolved: Boolean(nextState.raidResolved),
          tasks: mergeTaskDefaults(nextState.tasks, defaults.tasks),
          route: nextState.route === "checkin" ? "home" : nextState.route || defaults.route,
          privacySheetOpen: false,
          checkinSnapshot: null,
          timerSeconds: 0
        };
      }

      function saveState() {
        safeStorageSet(state);
      }

      function safeStorageGet() {
        try {
          return window.localStorage.getItem(STORAGE_KEY);
        } catch {
          return null;
        }
      }

      function safeStorageSet(nextState) {
        try {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        } catch {
          // file:// previews may block localStorage; the in-memory state still works.
        }
      }

      function safeStorageRemove() {
        try {
          window.localStorage.removeItem(STORAGE_KEY);
        } catch {
          // Ignore storage failures in direct file previews.
        }
      }

      function setRoute(route) {
        state.route = route;
        if (route !== "checkin") stopTimer();
        saveState();
        render();
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timeout);
        showToast.timeout = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      function selectedTask() {
        return state.tasks.find((task) => task.id === state.selectedTaskId) || state.tasks[0];
      }

      function chooseTask(taskId) {
        const task = state.tasks.find((item) => item.id === taskId) || state.tasks[0];
        state.selectedTaskId = task.id;
        state.manualMinutes = task.duration;
        state.timerSeconds = 0;
        state.checkinSnapshot = defaultCheckinSnapshot(task);
        stopTimer();
        saveState();
        render();
      }

      function answer(key, value) {
        state.onboarding[key] = value;
        saveState();
        render();
      }

      function toggleRings() {
        state.ringsExpanded = !state.ringsExpanded;
        saveState();
        render();
      }

      function openPrivacyPanel() {
        state.privacySheetOpen = true;
        saveState();
        render();
      }

      function closePrivacyPanel() {
        state.privacySheetOpen = false;
        saveState();
        render();
      }

      function setPrivacyMode(mode) {
        state.privacyMode = mode;
        state.privacySheetOpen = false;
        saveState();
        render();
      }

      function showBadgeInfo(title, description) {
        showToast(`${title}：${description}`);
      }

      function currentTeamProgress() {
        return state.team.members.reduce((sum, member) => sum + member.contribution, 0);
      }

      function currentTeamMinutes() {
        return state.team.members.reduce((sum, member) => sum + (member.minutes || 0), 0);
      }

      function currentTeamDistance() {
        return Number(state.team.members.reduce((sum, member) => sum + (member.distance || 0), 0).toFixed(1));
      }

      function raidMapImage(mode = state.raidMapMode) {
        return mode === "campus" ? MAP_IMAGES.campus : MAP_IMAGES.lake;
      }

      function raidMapLabel(mode = state.raidMapMode) {
        return mode === "campus" ? "闵行校区全图" : "思源湖近景";
      }

      function visibleRaidPoints(mode = state.raidMapMode) {
        return state.raid.points.filter((point) => {
          if (mode !== "campus") return point.scope === "lake";
          const pos = pointPosition(point, "campus");
          return !(String(pos.x).startsWith("-") || String(pos.y).startsWith("-"));
        });
      }

      function pointPosition(point, mode = state.raidMapMode) {
        const position = point.position && point.position[mode];
        return position || { x: point.x, y: point.y };
      }

      function selectedRaidPoint() {
        return state.raid.points.find((point) => point.id === state.raidPointId) || state.raid.points[0];
      }

      function pendingRaidPoint() {
        return state.raid.points.find((point) => point.id === state.pendingRaidPointId) || selectedRaidPoint();
      }

      function selectedBoss() {
        const bosses = state.raid.bosses || [];
        return bosses.find((boss) => boss.id === state.bossId) || bosses[0] || {
          name: state.raid.bossName,
          weakness: state.raid.weakness,
          intro: "完成运动挑战获得道具，全宿舍一起推进 Boss 血量。",
          colorA: "#5e5ce6",
          colorB: "#bf5af2",
          shape: "24px"
        };
      }

      function selectBoss(bossId) {
        const boss = (state.raid.bosses || []).find((item) => item.id === bossId);
        if (!boss) return;
        state.bossId = boss.id;
        state.raid.bossName = boss.name;
        state.raid.weakness = boss.weakness;
        state.raidResolved = false;
        saveState();
        render();
      }

      function selectRaidPoint(pointId) {
        const point = state.raid.points.find((item) => item.id === pointId);
        if (!point) return;
        state.raidPointId = point.id;
        if (point.scope === "campus") state.raidMapMode = "campus";
        state.raidResolved = false;
        saveState();
        render();
      }

      function openRaidSection(section = "map") {
        state.route = "raid";
        state.raidMapMode = "campus";
        saveState();
        render();
        requestAnimationFrame(() => {
          const targetId = section === "battle" ? "raid-battle" : section === "codex" ? "boss-codex" : "raid-map";
          const target = document.getElementById(targetId);
          target?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      function setRaidMapMode(mode) {
        state.raidMapMode = mode === "campus" ? "campus" : "lake";
        const points = visibleRaidPoints(state.raidMapMode);
        if (!points.some((point) => point.id === state.raidPointId)) {
          state.raidPointId = (points[0] || state.raid.points[0]).id;
          state.raidResolved = false;
        }
        saveState();
        render();
      }

      function bossDamageForType(type, baseDamage = 12) {
        const boss = selectedBoss();
        return baseDamage + (type === boss.weakness ? 10 : 0);
      }

      function sortedRaidPoints(points, activeId = state.raidPointId) {
        return [...points].sort((a, b) => {
          if (a.id === activeId) return 1;
          if (b.id === activeId) return -1;
          return 0;
        });
      }

      function resolveRaidChallenge() {
        const point = selectedRaidPoint();
        state.raidResolved = true;
        const tool = state.raid.inventory.find((item) => item.name === point.reward);
        if (tool) tool.count += 1;
        state.user.points += 6;
        const me = state.team.members.find((member) => member.id === state.user.id);
        if (me) me.contribution += 1;
        saveState();
        render();
        showToast(`获得「${point.reward}」，可在道具仓点击使用`);
      }

      function useRaidTool(toolName) {
        const tool = state.raid.inventory.find((item) => item.name === toolName);
        const boss = selectedBoss();
        if (!tool || tool.count <= 0) {
          showToast("这个道具暂时没有库存");
          return;
        }
        const damage = bossDamageForType(tool.type, 12);
        tool.count -= 1;
        boss.hp = Math.max(0, boss.hp - damage);
        state.raid.bossName = boss.name;
        state.raid.weakness = boss.weakness;
        saveState();
        render();
        showToast(`${tool.name}${tool.type === boss.weakness ? "命中弱点" : "发动攻击"}，造成 ${damage} 点伤害`);
      }

      function previewRaidPoint(pointId) {
        const point = state.raid.points.find((item) => item.id === pointId);
        if (!point) return;
        state.raidPointId = pointId;
        saveState();
        render();
      }

      function miniRaidMap() {
        const mode = state.raidMapMode || "lake";
        const points = sortedRaidPoints(visibleRaidPoints(mode));
        return `
          <div class="mini-map" style="background-image:url('${raidMapImage(mode)}')" role="button" tabindex="0" aria-label="打开副本校园地图" onclick="event.stopPropagation(); openRaidSection('map')" onkeydown="if(event.key === 'Enter' || event.key === ' '){ event.preventDefault(); event.stopPropagation(); openRaidSection('map'); }">
            ${points
              .map((point) => {
                const pos = pointPosition(point, mode);
                return `
                <span class="mini-map-dot ${point.id === state.raidPointId ? "active" : ""}" style="--x:${pos.x};--y:${pos.y};--dot:${point.color};">${point.shortName}</span>
              `
              })
              .join("")}
          </div>
        `;
      }

      function raidBattlePanel({ compact = false } = {}) {
        const point = selectedRaidPoint();
        const boss = selectedBoss();
        const hitWeakness = point.type === boss.weakness;
        const previewTool = state.raid.inventory.find((tool) => tool.type === point.type && tool.count > 0) || state.raid.inventory.find((tool) => tool.count > 0) || state.raid.inventory[0];
        const previewDamage = previewTool ? bossDamageForType(previewTool.type, 12) : bossDamageForType(point.type, point.damage);
        const afterHp = Math.max(0, boss.hp - previewDamage);
        const bossStyle = `--boss-a:${boss.colorA};--boss-b:${boss.colorB};--shape:${boss.shape};`;
        const totalTools = state.raid.inventory.reduce((sum, tool) => sum + tool.count, 0);
        return `
          <div class="battle-stage ${compact ? "home-battle" : ""}" ${compact ? "" : 'id="raid-battle"'}>
            <div class="switch-row">
              <span>
                <h2 class="section-title" style="color:#fff;">${boss.name}</h2>
                <p class="tiny">今日弱点：${boss.weakness}。${hitWeakness ? `${point.name}挑战可触发暴击。` : `当前任务是${point.type}，可先攒道具或切到${boss.weakness}点。`}</p>
              </span>
              <span class="raid-chip">用道具 ${boss.hp} → ${afterHp}</span>
            </div>
            ${bossHealth()}
            <div class="battle-field">
              <div class="squad">
                <span class="fighter crown" style="--color:#147a64"></span>
                <span class="fighter" style="--color:#2a8ca0"></span>
                <span class="fighter" style="--color:#f2b84b"></span>
              </div>
              <div class="boss-side">
                <span class="boss-figure" style="${bossStyle}"></span>
              </div>
            </div>
            <div class="inventory-panel">
              <div class="switch-row">
                <span>
                  <b>当前道具仓</b>
                  <p class="tiny">先由成员分头完成任务攒道具，再按 Boss 弱点组合出手。</p>
                </span>
                <span class="raid-chip">${totalTools} 件</span>
              </div>
              <div class="tool-row">
                ${state.raid.inventory
                  .map(
                    (tool) => `
                    <button class="tool-card ${tool.count <= 0 ? "empty" : ""}" onclick="useRaidTool('${tool.name}')">
                      <b>${tool.name}</b>
                      <span>${tool.type} · ${tool.count} 个</span>
                      <small>${tool.effect || "可用于攻击 Boss"}</small>
                    </button>
                  `
                  )
                  .join("")}
              </div>
            </div>
          </div>
        `;
      }

      function bossHealth(value = selectedBoss().hp) {
        const boss = selectedBoss();
        const maxHp = boss.maxHp || state.raid.targetHp || 500;
        const pct = Math.max(0, Math.min(100, (value / maxHp) * 100));
        return `
          <div class="boss-health">
            <div class="boss-health-row"><span>${boss.name}</span><b>${value} / ${maxHp}</b></div>
            <div class="boss-bar" style="--value:${pct}%"><span></span></div>
          </div>
        `;
      }

        const bosses = (state.raid.bosses || []).slice(0, 3);

                return `
                  <div class="hero-boss">
                    <span class="hero-boss-avatar" style="--boss-a:${boss.colorA};--boss-b:${boss.colorB};--shape:${boss.shape};"><i class="${boss.deco || "crown"}"></i></span>
                    <b>${boss.name}</b>
                    <span class="hero-boss-bar" aria-hidden="true" style="--value:${pct}%"><span></span></span>

                `;

            <b>D32-602 小队</b>
            <p class="sub">本周 Boss：${bosses.map((boss) => boss.name).join(" · ")}</p>

      function completeCheckin() {
        const task = selectedTask();
        const hasTimer = state.timerSeconds > 0;
        const minutes = hasTimer ? Math.max(1, Math.ceil(state.timerSeconds / 60)) : Math.max(1, state.manualMinutes || task.duration);
        const me = state.team.members.find((member) => member.id === state.user.id);
        const distance = task.distance ? Number(Math.min(task.distance, (minutes / task.duration) * task.distance).toFixed(1)) : 0;
        state.checkins.push({
          id: `c-${Date.now()}`,
          userId: state.user.id,
          taskId: task.id,
          duration: minutes,
          distance,
          createdAt: new Date().toISOString()
        });
        state.user.xp += task.rewardXp;
        state.user.points += task.rewardPoints;
        state.user.streak += 1;
        state.user.level = Math.max(1, Math.floor(state.user.xp / 120) + 1);
        if (me) {
          me.contribution += 1;
          me.minutes += minutes;
          me.distance = Number((me.distance + distance).toFixed(1));
        }
        state.timerSeconds = 0;
        state.checkinSnapshot = null;
        stopTimer();
        state.route = "result";
        saveState();
        render();

      function parseTimerLabel(label) {
        const match = String(label || "").trim().match(/^(\d{2}):(\d{2})$/);
        if (!match) return null;
        return Number(match[1]) * 60 + Number(match[2]);
      }

      function readNumericText(value, fallback) {
        const parsed = Number(String(value || "").replace(/[^\d.]/g, ""));
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function defaultCheckinSnapshot(task) {
        return {
          seconds: 0,
          calories: task.calories,
          exerciseMinutes: task.exerciseMinutes,
          thirdValue: task.distance ? task.distance : task.steps,
          thirdIsDistance: Boolean(task.distance)
        };
      }

      function activePhaseIndex(task, elapsedSeconds) {
        const phases = task.phases || [];
        let boundary = 0;
        for (let i = 0; i < phases.length; i += 1) {
          boundary += phases[i].minutes * 60;
          if (elapsedSeconds < boundary) return i;
        }
        return Math.max(0, phases.length - 1);
      }

      function phaseIsComplete(task, phaseIndex, elapsedSeconds) {
        const phases = task.phases || [];
        const boundary = phases
          .slice(0, phaseIndex + 1)
          .reduce((sum, phase) => sum + phase.minutes * 60, 0);
        return elapsedSeconds >= boundary;
      }

      function readCheckinSnapshot(task) {
        const timerNode = document.querySelector("[data-timer-value]");
        const metricNodes = document.querySelectorAll("[data-live-metric]");
        const metricLabels = document.querySelectorAll(".live-metric .tiny");
        const timerSeconds = parseTimerLabel(timerNode?.textContent);
        return {
          seconds: timerSeconds ?? state.timerSeconds ?? 0,
          calories: readNumericText(metricNodes[0]?.textContent, task.calories),
          exerciseMinutes: readNumericText(metricNodes[1]?.textContent, task.exerciseMinutes),
          thirdValue: readNumericText(metricNodes[2]?.textContent, task.distance || task.steps || 0),
          thirdIsDistance: String(metricLabels[2]?.textContent || "").includes("公里")
        };
      }

      function startTimer() {
        stopTimer();
        const task = selectedTask();
        const snapshot = state.checkinSnapshot || readCheckinSnapshot(task);
        state.checkinSnapshot = snapshot;
        state.timerSeconds = Math.max(0, state.timerSeconds || 0);
        saveState();
        const totalSeconds = task.duration * 60;
        timerId = setInterval(() => {
          state.timerSeconds += 1;
          const baseline = state.checkinSnapshot || snapshot;
          const progress = Math.min(1, Math.max(0, state.timerSeconds / totalSeconds));
          const remainingSeconds = Math.max(0, totalSeconds - state.timerSeconds);
          const ring = document.querySelector(".timer-ring");
          const value = document.querySelector("[data-timer-value]");
          if (ring) {
            ring.style.setProperty("--move-angle", `${Math.round(progress * 360)}deg`);
            ring.style.setProperty("--exercise-angle", `${Math.round(Math.min(1, progress * 0.92) * 360)}deg`);
            ring.style.setProperty("--stand-angle", `${Math.round(Math.min(1, progress * 0.72) * 360)}deg`);
          }
          if (value) value.textContent = formatTimer(remainingSeconds);
          const progressTrack = document.querySelector(".timer-progress-track");
          const progressState = document.querySelector(".timer-progress-label span:first-child");
          const progressText = document.querySelector(".timer-progress-label span:last-child");
          if (progressTrack) progressTrack.style.setProperty("--value", `${Math.round(progress * 100)}%`);
          if (progressState) progressState.textContent = progress >= 1 ? "已完成" : "进行中";
          if (progressText) progressText.textContent = `${Math.round(progress * 100)}%`;
          document.querySelectorAll(".timer-box .phase-chip").forEach((chip, index) => {
            chip.classList.toggle("done", phaseIsComplete(task, index, state.timerSeconds));
            chip.classList.toggle("active", index === activePhaseIndex(task, state.timerSeconds));
          });
          const liveValues = document.querySelectorAll("[data-live-metric]");
          if (liveValues[0]) liveValues[0].textContent = baseline.calories;
          if (liveValues[1]) liveValues[1].textContent = baseline.exerciseMinutes;
          if (liveValues[2]) liveValues[2].textContent = baseline.thirdValue;
          if (progress >= 1) {
            stopTimer();
            saveState();
          }
        }, 1000);
      }

      function stopTimer() {
        if (timerId) clearInterval(timerId);
        timerId = null;
      }

      function formatTimer(seconds) {
        const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
        const secs = String(seconds % 60).padStart(2, "0");
        return `${mins}:${secs}`;
      }

                    .join("")}
                </div>
                <div class="metric-caption">
                  <span>本次目标</span>
                  <span>完成后计入小队</span>
                </div>
                <div class="live-metrics">
                  <div class="live-metric"><b data-live-metric>${snapshot.calories}</b><span class="tiny">预计 kcal</span></div>
                  <div class="live-metric"><b data-live-metric>${snapshot.exerciseMinutes}</b><span class="tiny">预计运动</span></div>
                  <div class="live-metric"><b data-live-metric>${snapshot.thirdValue}</b><span class="tiny">${snapshot.thirdIsDistance ? "预计公里" : "预计步数"}</span></div>
                </div>
                <div class="chip-row">
                  <button class="btn dark" onclick="startTimer()">${icons.play}开始</button>
                  <button class="btn ghost" onclick="stopTimer()">暂停</button>
                </div>
              </div>

              <div class="panel verify-panel stack">
                <div class="switch-row">
                  <h2 class="section-title">数据来源</h2>
                  <span class="chip active">推荐授权</span>
                </div>
                <div class="source-grid">
                  <button class="source-card" onclick="showToast('可申请读取 Apple 健康 / 手机运动数据，用于核验步数、距离和活动能量。')">
                    <span class="icon coral">${icons.shield}</span>
                    <span>
                      <h3>连接手机健康数据</h3>
                      <p>读取活动能量、运动分钟、步数/距离，避免只靠手动打卡。</p>
                    </span>
                    <span class="chip">申请</span>
                  </button>
                  <button class="source-card" onclick="showToast('支持从 Apple 健身、华为运动健康、小米运动等截图或数据导入。')">
                    <span class="icon teal">${icons.chart}</span>
                    <span>
                      <h3>导入运动软件记录</h3>
                      <p>可用截图或授权数据作为小队积分依据。</p>
                    </span>
                    <span class="chip">导入</span>
                  </button>
                </div>
              </div>

              <div class="panel stack">
                <h2 class="section-title">手动补录</h2>
                <p class="sub">仅作为无设备时的兜底；超过奖励阈值需要健康数据或截图佐证。</p>
                <div class="number-row">
                  <button class="btn ghost" onclick="state.manualMinutes = Math.max(1, state.manualMinutes - 1); saveState(); render();">${icons.minus}</button>
                  <div class="number-display">${state.manualMinutes} 分钟</div>
                  <button class="btn ghost" onclick="state.manualMinutes += 1; saveState(); render();">${icons.plus}</button>
                </div>
                <button class="btn primary" onclick="completeCheckin()">${icons.check}完成打卡</button>
              </div>
            </div>
          </section>
        `;
      }

      function raidScreen() {
        const point = selectedRaidPoint();
        const boss = selectedBoss();
        const hitWeakness = point.type === boss.weakness;
        const maxHp = boss.maxHp || 500;
        const mode = state.raidMapMode || "lake";
        const points = sortedRaidPoints(visibleRaidPoints(mode), point.id);
        const bosses = state.raid.bosses || [];
        const routePlanNote = "可导入课表，按实际上课位置刷新附近运动任务点。";
        return `
          <section class="screen without-nav">
            <div class="topbar">
              <button class="btn small ghost" onclick="setRoute('home')">返回</button>
              <div class="brand"><span class="mark app-mark">${icons.app}</span><span>副本校园</span></div>
            </div>
            <div class="stack">
              <div class="page-title">
                <h1>${boss.name}副本</h1>
                <p class="tiny">${boss.intro}</p>
                <p class="sub">点击校园运动挑战可获得攻击道具；每日 Boss 会刷新弱点，完成对应类型任务可造成暴击伤害。小队成员可以分头选择训练点和出手顺序，本周 Boss 池会轮换，优先击破关键目标推进宿舍进度。</p>
              </div>

              <div class="campus-map ${mode}" id="raid-map" style="background-image:url('${raidMapImage(mode)}')">
                <div class="map-control-row">
                  <span class="map-badge">${raidMapLabel(mode)}</span>
                  <span class="map-toggle">
                    <button class="${mode === "lake" ? "active" : ""}" onclick="setRaidMapMode('lake')">近景</button>
                    <button class="${mode === "campus" ? "active" : ""}" onclick="setRaidMapMode('campus')">全图</button>
                  </span>
                </div>
                ${points
                  .map((item) => {
                    const pos = pointPosition(item, mode);
                    return `
                    <button class="campus-point ${item.id === point.id ? "active" : ""}" style="--x:${pos.x};--y:${pos.y};--dot:${item.color};" onclick="selectRaidPoint('${item.id}')">
                      <span class="point-token">${item.shortName}</span>
                      <b>${item.name}</b>
                      <small>${item.type}</small>
                    </button>
                  `
                  })
                  .join("")}
              </div>
              <div class="route-planner">
                <button class="route-plan-btn" type="button">根据上课地点定义任务</button>
                <p class="tiny">${routePlanNote}</p>
              </div>

              <div class="panel stack">
                <div class="switch-row">
                  <span>
                    <h2 class="section-title">${point.name}挑战</h2>
                    <p class="tiny">${point.note}</p>
                  </span>
                  <span class="chip ${hitWeakness ? "active" : ""}">${hitWeakness ? "弱点命中" : point.type}</span>
                </div>
                <div class="task-item">
                  <span class="icon ${hitWeakness ? "coral" : "teal"}">${hitWeakness ? icons.flame : icons.foot}</span>
                  <span>
                    <h3>${point.task}</h3>
                    <p>完成后获得「${point.reward}」，放入道具仓后可选择时机使用。</p>
                    <div class="task-tags"><span>${point.type}</span><span>道具 +1</span><span>D32 贡献 +1</span></div>
                  </span>
                  <span class="quest-reward">+1</span>
                </div>
                <button class="btn primary" onclick="resolveRaidChallenge()">${icons.check}${state.raidResolved ? "再次获得道具" : "完成挑战拿道具"}</button>
              </div>

              ${raidBattlePanel()}

              <div class="panel boss-codex" id="boss-codex">
                <div class="switch-row">
                  <h2 class="section-title">本周 Boss 图鉴</h2>
                  <span class="tiny">点击查看弱点</span>
                </div>
                <div class="boss-list">
                  ${bosses
                    .map(
                      (item) => `
                      <button class="boss-card ${item.id === boss.id ? "active" : ""}" onclick="selectBoss('${item.id}')">
                        <span class="boss-mini" style="--boss-a:${item.colorA};--boss-b:${item.colorB};--shape:${item.shape};"><i class="${item.deco || "crown"}"></i></span>
                        <b>${item.name}</b>
                        <small>${item.weakness}弱点</small>
                      </button>
                    `
                    )
                    .join("")}
                </div>
                <div class="journey-banner">
                  <b>${boss.name} · 血量 ${boss.hp} / ${maxHp}</b>
                  <span>${boss.intro}</span>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function resultScreen() {
        const task = selectedTask();
        return `
          <section class="screen without-nav">
            <div class="result-burst">
              <div class="medal">${icons.trophy}</div>
              <div>
                <h1>打卡完成</h1>
                <p class="sub">你给 D32-602 小队贡献了 1 次，本周徽章又近了一步。</p>
              </div>
              <div class="stat-grid">
                <div class="stat"><b>+${task.rewardXp}</b><span>XP</span></div>
                <div class="stat"><b>${state.user.streak} 天</b><span>连胜</span></div>
                <div class="stat"><b>+1</b><span>小队贡献</span></div>
              </div>
              <div class="panel stack">
                <h2 class="section-title">下一次推荐</h2>
                <p class="sub">${state.onboarding.time} 继续做 ${task.duration} 分钟，连胜到 7 天可获得“开局稳住”徽章。</p>
              </div>
              <div class="hero-actions">
                <button class="btn primary" onclick="setRoute('team')">${icons.users}查看小队</button>
                <button class="btn ghost" onclick="setRoute('home')">回到首页</button>
              </div>
            </div>
          </section>
        `;
      }

      function teamScreen() {
        const progress = currentTeamProgress();
        const progressPct = Math.min(100, Math.round((progress / state.team.weeklyGoal) * 100));
        const sorted = [...state.team.members].sort((a, b) => {
          const bScore = b.contribution * 10 + (b.minutes || 0) * 0.25 + (b.distance || 0);
          const aScore = a.contribution * 10 + (a.minutes || 0) * 0.25 + (a.distance || 0);
          return bScore - aScore;
        });
        return shell(
          `
          <div class="stack">
            <div class="team-head">
              <div class="switch-row">
                <span class="tiny">上海交通大学 · 宿舍周挑战</span>
                <button class="btn small ghost privacy-trigger" onclick="openPrivacyPanel()">隐私</button>
              </div>
              <h2>${state.team.name}</h2>
              <p class="sub">进度按“有效打卡次数”结算；榜单展示内容由个人隐私等级决定。</p>
              <div class="meta-grid">
                <div class="stat"><b>${progress}</b><span>有效打卡</span></div>
                <div class="stat"><b>${currentTeamMinutes()}</b><span>运动分钟</span></div>
                <div class="stat"><b>${currentTeamDistance()}</b><span>公里</span></div>
              </div>
            </div>

            <div class="panel stack">
              <div class="switch-row">
                <h2 class="section-title">本周进度</h2>
                <span class="tiny">${progressPct}%</span>
              </div>
              <div class="progress-line" style="--value: ${progressPct}%"><span></span></div>
              <p class="sub">已完成 ${progress} / ${state.team.weeklyGoal} 次有效打卡，还差 ${Math.max(0, state.team.weeklyGoal - progress)} 次可解锁本周宿舍徽章。</p>
            </div>

            <div class="panel stack">
              <div class="switch-row">
                <h2 class="section-title">周贡献榜</h2>
                <span class="tiny">按隐私级别展示</span>
              </div>
              <div class="leader-list">
                ${sorted
                  .map(
                    (member, index) => `
                    <div class="leader">
                      <span class="rank">${index + 1}</span>
                      <span class="avatar ${member.id === state.user.id ? "me" : ""}">${member.avatar}</span>
                      <span>
                        <h3>${member.name}</h3>
                        <p>${member.baseline}</p>
                      </span>
                      ${leaderMetrics(member)}
                    </div>
                  `
                  )
                  .join("")}
              </div>
            </div>

            ${state.privacySheetOpen ? `
              <div class="privacy-modal" onclick="closePrivacyPanel()">
                <div class="privacy-sheet" onclick="event.stopPropagation()">
                  <div class="switch-row">
                    <div>
                      <h3>隐私展示</h3>
                      <p class="privacy-note">决定榜单右侧显示什么。越详细越适合熟人宿舍，越简洁越适合跨宿舍榜单。</p>
                    </div>
                    <button class="btn small ghost" onclick="closePrivacyPanel()">关闭</button>
                  </div>
                  <div class="privacy-options">
                    <button class="privacy-option ${state.privacyMode === "minimal" ? "active" : ""}" onclick="setPrivacyMode('minimal')">
                      <b>仅次数</b>
                      <p>只显示有效打卡次数，适合更强调隐私的展示。</p>
                    </button>
                    <button class="privacy-option ${state.privacyMode === "balanced" ? "active" : ""}" onclick="setPrivacyMode('balanced')">
                      <b>均衡</b>
                      <p>显示次数和运动分钟，兼顾氛围和隐私。</p>
                    </button>
                    <button class="privacy-option ${state.privacyMode === "detailed" ? "active" : ""}" onclick="setPrivacyMode('detailed')">
                      <b>详细</b>
                      <p>显示次数、分钟和距离，适合熟悉的小队互相激励。</p>
                    </button>
                  </div>
                </div>
              </div>
            ` : ""}
          </div>
        `,
          "team"
        );
      }

      function profileScreen() {
        const records = weeklyRecords();
        const activeRecord = records[state.selectedDay] || records[0];
        const levelProgress = Math.min(100, ((state.user.xp % 120) / 120) * 100);
        return shell(
          `
          <div class="stack">
            <div class="profile-head">
              <div class="profile-avatar">J</div>
              <div class="page-title">
                <h1>Jupiter</h1>
                <p class="sub">Lv.${state.user.level} · ${state.user.xp} XP · ${state.user.points} 积分 · D32-602 小队</p>
              </div>
            </div>

            <div class="panel stack">
              <div class="switch-row">
                <h2 class="section-title">等级进度</h2>
                <span class="tiny">距下一级 ${120 - (state.user.xp % 120)} XP</span>
              </div>
              <div class="progress-line" style="--value: ${levelProgress}%"><span></span></div>
              <div class="stat-grid">
                <div class="stat"><b>${state.user.streak}</b><span>连续天数</span></div>
                <div class="stat"><b>${state.checkins.filter((item) => item.userId === state.user.id).length}</b><span>累计打卡</span></div>
                <div class="stat"><b>${state.user.points}</b><span>可用积分</span></div>
              </div>
            </div>

            <div class="panel stack">
              <div class="switch-row">
                <h2 class="section-title">本周日历</h2>
                <span class="tiny">点击查看记录</span>
              </div>
              <div class="week-grid">
                ${records
                  .map(
                    (record, index) => `
                    <button class="day ${record.status === "完成" ? "done" : ""} ${record.status === "未完成" ? "missed" : ""} ${record.status === "未开始" ? "future" : ""} ${state.selectedDay === index ? "active" : ""}" onclick="setSelectedDay(${index})">
                      <b>${record.day}</b>
                      <span>${record.status}</span>
                    </button>
                  `
                  )
                  .join("")}
              </div>
              <div class="day-detail">
                <span class="icon teal">${activeRecord.status === "完成" ? icons.check : icons.play}</span>
                <span>
                  <h3>${activeRecord.title}</h3>
                  <p>${activeRecord.detail}</p>
                </span>
                <b>${activeRecord.minutes} 分</b>
              </div>
              <p class="tiny">距离 ${activeRecord.distance || 0} km · 记录用于成长反馈，不做公开全校排名。</p>
            </div>

            <div class="panel stack">
              <h2 class="section-title">徽章</h2>
              <div class="badge-grid">
                ${badge("三环起步", "完成一次三环目标训练", icons.flame, true, "#ff375f", "#ff9f0a")}
                ${badge("D32 助攻", "为宿舍小队贡献 3 次有效打卡", icons.users, true, "#00c7be", "#147a64")}
                ${badge("周六补位", "在周末补齐一次计划内训练", icons.check, true, "#64d2ff", "#0a84ff")}
                ${badge("七日连胜", "连续 7 天完成至少一个运动任务", icons.trophy, state.user.streak >= 7, "#ffd60a", "#ff9f0a")}
                ${badge("体测预备", "完成 3 次体测心肺唤醒训练", icons.chart, false, "#bf5af2", "#5e5ce6")}
                ${badge("隐私守护", "开启榜单隐私展示设置", icons.shield, true, "#8e8e93", "#3a3a3c")}
              </div>
            </div>

            <div class="panel stack">
              <h2 class="section-title">奖励</h2>
              <div class="reward-list">
                ${reward("补签卡", "80 积分", icons.rotate)}
                ${reward("操场夜跑贴纸", "120 积分", icons.gift)}
              </div>
            </div>

            <div class="panel stack">
              <div class="switch-row">
                <span>
                  <h2 class="section-title">个性化任务</h2>
                  <p class="tiny">关闭后按通用低门槛任务分发</p>
                </span>
                <button class="switch ${state.recommendationsOn ? "" : "off"}" onclick="state.recommendationsOn = !state.recommendationsOn; saveState(); render();">
                  <span></span>
                </button>
              </div>
              <button class="btn ghost" onclick="resetDemo()">${icons.rotate}恢复初始数据</button>
              <button class="btn ghost" onclick="showToast('基础任务不采集定位和健康数据，后续授权可随时关闭。')">${icons.shield}隐私说明</button>
            </div>
          </div>
        `,
          "profile"
        );
      }

      function badge(label, description, icon, unlocked, colorA = "#147a64", colorB = "#1f9d78") {
        return `
          <button class="badge ${unlocked ? "" : "locked"}" style="--badge-a:${colorA};--badge-b:${colorB};" onclick="showBadgeInfo('${label}', '${description}')">
            <span class="badge-icon">${icon}</span>
            <b>${label}</b>
            <p>${unlocked ? description : "未解锁：" + description}</p>
          </button>
        `;
      }

      function reward(title, cost, icon) {
        return `
          <div class="reward">
            <span class="icon amber">${icon}</span>
            <span>
              <h3>${title}</h3>
              <p>${cost}</p>
            </span>
            <button class="btn small ghost" onclick="showToast('已加入兑换清单')">兑换</button>
          </div>
        `;
      }

      function render() {
        const routes = {
          welcome: welcomeScreen,
          onboarding: onboardingScreen,
          home: homeScreen,
          raid: raidScreen,
          checkin: checkinScreen,
          result: resultScreen,
          team: teamScreen,
          profile: profileScreen
        };
        document.getElementById("app").innerHTML = (routes[state.route] || homeScreen)();
      }

      function showFallback(error) {
        const app = document.getElementById("app");
        const message = error && error.message ? error.message : "未知初始化错误";
        app.innerHTML = `
          <section class="screen without-nav">
            <div class="statusbar">
              <div class="brand"><span class="mark app-mark">${icons.app}</span><span>副本校园</span></div>
              <span>快速恢复</span>
            </div>
            <div class="panel stack" style="margin-top: 20vh;">
              <h1 style="margin: 0; font-size: 28px;">页面刚刚卡住了</h1>
              <p class="sub">当前浏览器可能限制了本地文件存储。点击下面按钮会用初始数据重新进入。</p>
              <p class="tiny">错误信息：${message}</p>
              <button class="btn primary" onclick="state = seedState(); render();">${icons.play}重新进入</button>
            </div>
          </section>
        `;
      }

      window.setRoute = setRoute;
      window.chooseTask = chooseTask;
      window.answer = answer;
      window.startTimer = startTimer;
      window.stopTimer = stopTimer;
      window.completeCheckin = completeCheckin;
      window.setRaidMapMode = setRaidMapMode;
      window.selectRaidPoint = selectRaidPoint;
      window.selectBoss = selectBoss;
      window.openRaidSection = openRaidSection;
      window.useRaidTool = useRaidTool;
      window.resetDemo = resetDemo;
      window.showToast = showToast;
      window.state = state;
      window.saveState = saveState;
      window.render = render;

      window.addEventListener("error", (event) => showFallback(event.error || event.message));

      try {
        render();
      } catch (error) {
        showFallback(error);
      }
    </script>
  </body>
</html>
